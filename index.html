/* ============================
   PROGRESS CALC
   ============================ */
function calcProgress(completed, week){
  const wd = W[week];
  if(!wd) return {done:0,total:0,pct:0,byMember:{}};
  let total=0, done=0;
  const byMember = {};
  MEMBERS.forEach(m=>{
    const t = wd.tasks[m.id];
    if(!t) return;
    const cnt = t.deliverables.length;
    let d = 0;
    t.deliverables.forEach((_,i)=>{
      if(completed[`${week}-${m.id}-${i}`]) d++;
    });
    total += cnt; done += d;
    byMember[m.id] = {done:d, total:cnt};
  });
  return {done,total,pct:total?Math.round(done/total*100):0,byMember};
}

function WeekSelector({week,setWeek,lang,completed}){

                <span style={{width:'8px',height:'8px',borderRadius:'50%',background:tm.color}} />
              </div>
              <span style={{color:'#4A5568'}}>{h.desc[lang]}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* --- Milestone Timeline --- */
function MilestoneTimeline({week,setWeek,lang}){
  const title = {ko:'마일스톤',zh:'里程碑'};
  return (
    <div className="milestone-sidebar" style={{
      background:'#FFFFFF',borderRadius:'12px',boxShadow:'0 1px 3px rgba(0,0,0,.04)',
      padding:'20px',width:'250px',flexShrink:0,alignSelf:'flex-start',
      position:'sticky',top:'16px',
    }}>
      <h3 style={{fontSize:'13px',fontWeight:600,color:'#2D3748',marginBottom:'18px'}}>{title[lang]}</h3>
      <div className="milestone-list" style={{position:'relative',display:'flex',flexDirection:'column'}}>
        {/* line */}
        <div className="milestone-line" style={{position:'absolute',left:'11px',top:'12px',bottom:'12px',width:'2px',background:'#EDF2F7'}} />
        {MILESTONES.map((m,i)=>{
          const past=m.week<week, cur=m.week===week, fut=m.week>week;
          let bg='#CBD5E0';
          const extra={};
          if(past) bg='#48BB78';
          else if(cur){ bg='#4299E1'; extra.animation='pulse 2s infinite'; }
          return (
            <div key={m.week} onClick={()=>setWeek(m.week)} style={{
              display:'flex',alignItems:'flex-start',gap:'12px',
              marginBottom:i<7?'18px':0,cursor:'pointer',padding:'2px 0',
            }}>
              <div style={{
                width:'22px',height:'22px',borderRadius:'50%',background:bg,flexShrink:0,
                display:'flex',alignItems:'center',justifyContent:'center',
                position:'relative',zIndex:1,...extra,
              }}>
                {past&&<span style={{color:'#fff',fontSize:'11px',fontWeight:700}}>✓</span>}
                {(cur||fut)&&<span style={{color:'#fff',fontSize:'10px',fontWeight:600}}>{m.week}</span>}
              </div>
              <div style={{paddingTop:'1px',minWidth:0}}>
                <div style={{
                  fontSize:'11.5px',fontWeight:600,
                  color:cur?'#2B6CB0':past?'#276749':'#A0AEC0',
                  marginBottom:'1px',display:'flex',alignItems:'center',gap:'4px',
                }}>
                  {lang==='ko'?`${m.week}주차`:`第${m.week}周`}
                  {m.critical&&<span style={{fontSize:'13px'}}>⚠️</span>}
                </div>
                <div style={{fontSize:'11px',color:cur?'#4A5568':past?'#718096':'#A0AEC0',lineHeight:'1.45'}}>
                  {m.text[lang]}
                </div>
                {m.critical&&(
                  <div style={{
                    marginTop:'3px',padding:'2px 7px',borderRadius:'4px',
                    background:'#FFF3E0',color:'#E65100',fontSize:'10px',fontWeight:600,display:'inline-block',
                  }}>
                    {lang==='ko'?'연기불가':'不可延期'}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* --- Week Progress Bar --- */
function WeekProgress({progress,lang}){
  const label = {ko:'이번 주 진행률',zh:'本周进度'};
  const compL = {ko:'완료',zh:'已完成'};
  return (
    <div style={{
      display:'flex',alignItems:'center',gap:'16px',marginBottom:'18px',
      padding:'12px 16px',background:'#FFFFFF',borderRadius:'10px',
      boxShadow:'0 1px 3px rgba(0,0,0,.04)',flexWrap:'wrap',
    }}>
      <span style={{fontSize:'12.5px',fontWeight:600,color:'#4A5568'}}>{label[lang]}</span>
      <div style={{flex:1,minWidth:'120px',height:'8px',borderRadius:'4px',background:'#EDF2F7',overflow:'hidden'}}>
        <div style={{
          width:`${progress.pct}%`,height:'100%',borderRadius:'4px',
          background:progress.pct===100?'#48BB78':'linear-gradient(90deg,#4A90D9,#63B3ED)',
          transition:'width .4s cubic-bezier(.22,1,.36,1)',
        }} />
      </div>
      <span style={{fontSize:'12px',color:'#718096',whiteSpace:'nowrap'}}>
        {progress.done}/{progress.total} {compL[lang]} ({progress.pct}%)
      </span>
      {/* per-member dots */}
      <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
        {MEMBERS.map(m=>{
          const pm = progress.byMember[m.id];
          if(!pm) return null;
          const allDone = pm.done===pm.total&&pm.total>0;
          return (
            <span key={m.id} title={m.name} style={{
              width:'18px',height:'18px',borderRadius:'50%',
              background:allDone?m.color:m.color+'30',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:'9px',color:allDone?'#fff':m.color,fontWeight:700,
              transition:'all .3s',
            }}>
              {allDone?'✓':pm.done}
            </span>
          );
        })}
      </div>
    </div>
  );
}

/* ============================
   APP
   ============================ */
function App(){
  const [lang,setLang] = useState(()=>{
    try{ return localStorage.getItem('capstone-lang')||'ko'; }catch{ return 'ko'; }
  });
  const [week,setWeek] = useState(1);
  const [hovered,setHovered] = useState(null);
  const [completed,setCompleted] = useState(loadState);

  // persist lang
  useEffect(()=>{
    try{ localStorage.setItem('capstone-lang',lang); }catch{}
  },[lang]);

  // persist completed — debounced
  const saveTimer = useRef(null);
  useEffect(()=>{
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>saveState(completed),200);
    return ()=>{ if(saveTimer.current) clearTimeout(saveTimer.current); };
  },[completed]);

  const toggle = useCallback((key)=>{
    setCompleted(prev=>{
      const next = {...prev};
      if(next[key]) delete next[key]; else next[key] = true;
      return next;
    });
  },[]);

  const wd = W[week];
  const progress = useMemo(()=>calcProgress(completed,week),[completed,week]);
  const totalProgress = useMemo(()=>{
    let d=0,t=0;
    for(let w=1;w<=8;w++){
      const p=calcProgress(completed,w);
      d+=p.done; t+=p.total;
    }
    return {done:d,total:t,pct:t?Math.round(d/t*100):0};
  },[completed]);

  return (
    <div style={{minHeight:'100vh',background:'#F8F9FB'}}>
      <Header lang={lang} setLang={setLang} progress={totalProgress} />
      <WeekSelector week={week} setWeek={setWeek} lang={lang} completed={completed} />

      <div className="main-layout content-area" style={{padding:'24px 32px',display:'flex',gap:'24px',alignItems:'flex-start'}}>
        {/* main */}
        <div style={{flex:1,minWidth:0}}>
          {/* week title */}
          <div className="slide-up" key={`h-${week}`} style={{marginBottom:'16px'}}>
            <h2 style={{fontSize:'17px',fontWeight:700,color:'#1A202C',marginBottom:'4px'}}>
              {wd.title[lang]}
            </h2>
            <p style={{fontSize:'12.5px',color:'#718096'}}>{wd.desc[lang]}</p>
            {(week===3||week===7)&&(
              <div style={{
                marginTop:'8px',padding:'8px 14px',borderRadius:'8px',
                background:'#FFF3E0',color:'#E65100',fontSize:'12.5px',fontWeight:500,
              }}>
                ⚠️ {lang==='ko'?'핵심 마일스톤 — 연기 불가':'关键里程碑 — 不可延期'}
              </div>
            )}
          </div>

          {/* progress bar */}
          <WeekProgress progress={progress} lang={lang} />

          {/* cards */}
          <div className="card-grid slide-up" key={`c-${week}`} style={{display:'flex',gap:'14px',flexWrap:'wrap'}}>
            {MEMBERS.map(m=>{
              const t = wd.tasks[m.id];
              if(!t) return null;
              return (
                <TaskCard key={m.id} member={m} task={t} lang={lang} week={week}
                  hovered={hovered===m.id}
                  onHover={()=>setHovered(m.id)}
                  onLeave={()=>setHovered(null)}
                  completed={completed}
                  toggle={toggle}
                />
              );
            })}
          </div>

          {/* handoffs */}
          {wd.handoffs?.length>0&&(
            <HandoffFlow handoffs={wd.handoffs} hoveredMember={hovered} lang={lang} />
          )}
        </div>

        {/* sidebar */}
        <MilestoneTimeline week={week} setWeek={setWeek} lang={lang} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
